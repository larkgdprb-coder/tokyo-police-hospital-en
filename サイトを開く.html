<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東京警察病院 英語サイト</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 50px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 480px;
      width: 90%;
    }
    h1 { font-size: 22px; margin: 0 0 8px; color: #222; }
    .subtitle { font-size: 14px; color: #777; margin: 0 0 30px; }
    .btn {
      display: inline-block;
      background: #f4a000;
      color: #fff;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.2s;
    }
    .btn:hover { background: #d48c00; }
    .url {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
      word-break: break-all;
    }
    .note {
      margin-top: 24px;
      font-size: 12px;
      color: #999;
      border-top: 1px solid #eee;
      padding-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>東京警察病院 英語版サイト</h1>
    <p class="subtitle">Tokyo Police Hospital — English Website</p>
    <a class="btn" href="https://larkgdprb-coder.github.io/tokyo-police-hospital-en/" target="_blank">
      サイトを開く / Open Site
    </a>
    <p class="url">https://larkgdprb-coder.github.io/tokyo-police-hospital-en/</p>
    <p class="note">
      ※ GitHub Pages で公開中<br>
      ※ Hosted on GitHub Pages (free)
    </p>
  </div>
</body>
</html>
